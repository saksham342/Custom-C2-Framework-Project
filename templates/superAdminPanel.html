<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Panel</title>
    <style>
        /* General Styles */
        body {
            background-color: #121212;
            color: #00ff88;
            font-family: "Roboto Mono", monospace;
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3 {
            text-shadow: 0 0 8px #00ff88;
            margin: 0;
        }

        a {
            color: #00ff88;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 3px solid #00ff88;
        }

        .header .logo {
            display: flex;
            align-items: center;
        }

        .header img {
            width: 40px;
            margin-right: 10px;
        }

        .header h1 {
            font-size: 24px;
        }

        /* Admin Panel */
        .admin-panel {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
            margin-top: 20px;
        }

        .admin-panel .sidebar {
            background-color: #1a1a1a;
            padding: 15px;
            border: 1px solid #00ff88;
            border-radius: 5px;
        }

        .admin-panel .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .admin-panel .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .admin-panel .sidebar ul li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-panel .sidebar ul li:hover {
            background-color: #00ff88;
            color: #121212;
            border-color: #00ff88;
        }

        .admin-panel .content {
            background-color: #1a1a1a;
            padding: 20px;
            border: 1px solid #00ff88;
            border-radius: 5px;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #00ff88;
        }

        th {
            background-color: #212121;
        }

        td {
            background-color: #1a1a1a;
        }

        .btn {
            padding: 6px 12px;
            background-color: #00ff88;
            border: none;
            color: #121212;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #00cc70;
        }

        /* Admin Table Scroll */
        .admin-table-container {
            max-height: 300px;
            /* Set maximum height for the table */
            overflow-y: auto;
            /* Make it scrollable */
            margin-top: 20px;
            border: 1px solid #00ff88;
            border-radius: 5px;
        }

        /* Form Styles */
        .command-form input,
        .command-form select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 10px;
            background-color: #121212;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 5px;
        }

        .command-form button {
            background-color: #00ff88;
            color: #121212;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .command-form button:hover {
            background-color: #00cc70;
        }

        .hidden {
            display: none;
        }

        .password-form {
            margin-top: 20px;
        }

        .password-form input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 10px;
            background-color: #121212;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 5px;
        }

        .password-form button {
            background-color: #00ff88;
            color: #121212;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .password-form button:hover {
            background-color: #00cc70;
        }

        /* Style for the message sliding bar */
        #messageContainer {
            position: fixed;
            top: 20px;
            right: -100%;
            width: 300px;
            background-color: #ffffff;
            color: #00ff88;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 255, 136, 0.5);
            z-index: 9999;
            transition: right 0.5s ease-in-out;
        }

        #messageContainer p {
            margin: 0;
            font-size: 14px;
            text-align: center;
            font-family: "Roboto Mono", monospace;
            text-emphasis-color: white;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <img src="https://icons.iconarchive.com/icons/hopstarter/malware/256/Malware-icon.png">
            <h1>Super Admin Panel</h1>
        </div>
        <p>Manage System Settings</p>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Admin Panel Layout -->
        <div class="admin-panel">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>Admin Menu</h2>
                <ul>
                    <li onclick="showSection('changePasswordForm')">Change Superadmin Password</li>
                    <li onclick="showSection('createAdminsForm')">Create Admin Account</li>
                    <li onclick="showSection('manageAdmins')">Manage Admins</li>
                </ul>
            </div>

            <!-- Content Area -->
            <div class="content">
                <h2>Welcome to Superadmin Panel</h2>
                <br><br>
                <div id="changePasswordForm" class="password-form hidden">
                    <h3>Change Super Admin's Password</h3>
                    <hr
                        style="height: 2px; width: 80%; background-color: #c8e6c9; border: none; margin-left: 0;margin-top: 15px;">
                    <br><br>
                    <form id="superAdminpasswordForm">
                        <input type="password" id="currentPassword" placeholder="Current Password" required>
                        <input type="password" id="newPassword" placeholder="New Password" required>
                        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                        <br><br>
                        <button type="submit">Change Password</button>
                    </form>
                </div>

                <div id="createAdminsForm" class="password-form hidden">
                    <h3>Add Admin</h3>
                    <hr
                        style="height: 2px; width: 80%; background-color: #c8e6c9; border: none; margin-left: 0;margin-top: 15px;">
                    <br><br>
                    <div id="messageContainer"></div>
                    <form id="adminForm">
                        <input type="text" id="adminName" placeholder="Admin Name" required>
                        <input type="password" id="adminPassword" placeholder="Password" required>
                        <input type="password" id="confirmAdminPassword" placeholder="Confirm Password" required>
                        <br><br>
                        <button type="submit">Create Admin</button>
                    </form>
                </div>

                <div id="manageAdmins" class="password-form hidden">
                    <h3>Manage Admins</h3>
                    <hr
                        style="height: 2px; width: 80%; background-color: #c8e6c9; border: none; margin-left: 0;margin-top: 15px;">
                    <br><br>
                    <div class="admin-table-container">
                        <table id="adminTable">
                            <thead>
                                <tr>
                                    <th>Admin ID</th>
                                    <th>Code Name</th>
                                    <th>Admin Role</th>
                                    <th>Functionalities</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be dynamically inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- Change Admin Password Modal -->
                <!-- Modal -->
                <div id="changeAdminPasswordModal"
                    style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); z-index: 1000; padding: 30px; width: 350px; display: none;">
                    <div style="text-align: center;">
                        <h2 style="margin-bottom: 20px; font-size: 20px; color: #333;">Change Admin Password</h2>
                        <form id="changeAdminPasswordForm" style="display: flex; flex-direction: column; gap: 15px;">
                            <input type="password" id="adminCurrentPassword" placeholder="Current Password" required
                                style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">
                            <input type="password" id="adminNewPassword" placeholder="New Password" required
                                style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">
                            <input type="password" id="adminConfirmNewPassword" placeholder="Confirm New Password"
                                required
                                style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <button type="submit"
                                    style="flex: 1; background-color: #4CAF50; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 14px;">Change
                                    Password</button>
                                <button type="button" onclick="closeAdminPasswordModal()"
                                    style="flex: 1; background-color: #f44336; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 14px;">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Optional Overlay -->
                <div id="modalOverlay"
                    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; z-index: 999;">
                </div>

                </form>
            </div>
        </div>




    </div>
    </div>
    </div>

    <script>
        function showSection(section) {
            const sections = ['changePasswordForm', 'createAdminsForm', 'manageAdmins'];
            sections.forEach(s => {
                document.getElementById(s).style.display = s === section ? 'block' : 'none';
            });
        }


        // Fetch and list all admins
        function listAllAdmins() {
            fetch('/api/getAllAdmins', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const admins = data.admins;
                        const adminTableBody = document.querySelector('#adminTable tbody');
                        // Clear the table before adding new data
                        adminTableBody.innerHTML = '';
                        admins.forEach(admin => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                    <td>${admin.id}</td>
                    <td>${admin.codename}</td>
                    <td>${admin.role}</td>
                    <td>
                        <button class="btn" onclick="changeAdminPassword('${admin.codename}')">Change Password</button>
                        <button class="btn" onclick="deleteAdmin('${admin.codename}')">Delete</button>


                    </td>
                `;
                            adminTableBody.appendChild(row);
                        });
                    } else {
                        console.error(data.message || data.error);
                    }
                })
                .catch(error => {
                    console.error('Error fetching admins:', error);
                });
        }
        // Initialize the admin table on page load
        listAllAdmins();




        // Function to delete an admin and refresh the admin list
        async function deleteAdmin(adminCodename) {
            const userConfirmation = confirm(`Are you sure you want to delete the user ${adminCodename}?`);
            if (!userConfirmation) {
                // If the user clicks "Cancel," stop execution.
                return;
            }
            try {
                const response = await fetch('/api/deleteAdmin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user: adminCodename })
                });
                if (response.ok) {
                    const result = await response.json();
                    alert(`Success: ${result.message}`);

                    // Refresh the admin list after successful deletion
                    listAllAdmins();
                } else {
                    const error = await response.json();
                    alert(`Error: ${error.message}`);
                }
            } catch (err) {
                console.error('Error:', err);
                alert('An unexpected error occurred.');
            }
        }




        // Change Super Admin Password
        const superAdminPasswordForm = document.getElementById('superAdminpasswordForm');
        superAdminPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (newPassword !== confirmPassword) {
                alert('New passwords do not match.');
                return;
            }
            const payload = { currentPassword, newPassword, confirmPassword };
            try {
                const response = await fetch('/api/changeSuperAdminPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();

                if (response.ok) {
                    alert(data.message || 'Password changed successfully.');
                    superAdminPasswordForm.reset();
                } else {
                    alert(data.error || 'Failed to change password.');
                }
            } catch (error) {
                alert('An unexpected error occurred: ' + error.message);
            }
        });






        // Create Admin
        const adminForm = document.getElementById('adminForm');
        const messageContainer = document.getElementById('messageContainer');
        const showMessage = (message, isError = false) => {
            messageContainer.innerHTML = `<p style="color: ${isError ? 'red' : 'green'};">${message}</p>`;
            messageContainer.style.right = '20px';
            setTimeout(() => {
                messageContainer.style.right = '-100%';
            }, 3000);
        };
        adminForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const adminName = document.getElementById('adminName').value;
            const adminPassword = document.getElementById('adminPassword').value;
            const confirmAdminPassword = document.getElementById('confirmAdminPassword').value;
            if (adminPassword !== confirmAdminPassword) {
                showMessage('Admin passwords do not match.', true);
                return;
            }
            const payload = { codename: adminName, secret: adminPassword };
            try {
                const response = await fetch('/api/createAdmin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message || 'Admin created successfully.');
                    adminForm.reset();
                    // Refresh the admin list after creating a new admin
                    listAllAdmins();
                } else {
                    showMessage(data.error || 'Failed to create admin.', true);
                }
            } catch (error) {
                showMessage('An unexpected error occurred: ' + error.message, true);
            }
        });




        let isSubmitting = false; // Flag to prevent multiple submissions

        // Show the modal and overlay when "Change Password" button is clicked
        function changeAdminPassword(adminCodename) {
            const modal = document.getElementById('changeAdminPasswordModal');
            const overlay = document.getElementById('modalOverlay');
            modal.style.display = 'block';
            overlay.style.display = 'block';
            modal.setAttribute('data-admin-codename', adminCodename);

            const form = document.getElementById("changeAdminPasswordForm");

            // Remove any existing event listener to avoid multiple bindings
            form.removeEventListener("submit", handleSubmit);

            // Add the event listener for form submission
            form.addEventListener("submit", handleSubmit);

            async function handleSubmit(event) {
                // Prevent default behavior of form submission
                event.preventDefault();

                // Check if the form is already being submitted
                if (isSubmitting) return; // Prevent the form from submitting multiple times
                isSubmitting = true; // Set flag to indicate submission is in progress

                // Get the input values
                const currentPassword = document.getElementById("adminCurrentPassword").value;
                const newPassword = document.getElementById("adminNewPassword").value;
                const confirmPassword = document.getElementById("adminConfirmNewPassword").value;

                // Validate new passwords match
                if (newPassword !== confirmPassword) {
                    alert("New passwords do not match!");
                    isSubmitting = false; // Reset flag on validation failure
                    return;
                }

                // Prepare the payload
                const payload = {
                    currentPassword: currentPassword,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword,
                    adminCodename: adminCodename
                };

                try {
                    // Send POST request to the API
                    const response = await fetch("/api/changeAdminPassword", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(payload),
                    });

                    // Parse the response
                    const data = await response.json();

                    if (response.ok) {
                        // Handle success
                        alert(data.message || "Password changed successfully!");
                        closeAdminPasswordModal(); // Close the modal
                        form.reset(); // Reset the form
                    } else {
                        // Handle errors
                        alert(data.error || "Failed to change password.");
                    }
                } catch (error) {
                    alert("An unexpected error occurred: " + error.message);
                }

                // Reset the submitting flag after request is done
                isSubmitting = false;
            }
        }

        // Hide the modal and overlay when "Cancel" button is clicked
        function closeAdminPasswordModal() {
            const modal = document.getElementById('changeAdminPasswordModal');
            const overlay = document.getElementById('modalOverlay');
            modal.style.display = 'none';
            overlay.style.display = 'none';
        }

    </script>
</body>
</html>
