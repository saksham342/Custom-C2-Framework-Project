<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Command Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { display: flex; flex-direction: column; height: 98vh; }
        .bottom-section { height: 60vh; background-color: #000000; color: #0f0; display: flex; flex-direction: column; }
        .terminal { flex: 1; padding: 10px; overflow-y: auto; white-space: pre-wrap; }
        .input-area { border-top: 1px solid #555; padding: 5px; display: flex; align-items: center; }
        .input-area .prompt { color: #0f0; margin-right: 5px; font-family: monospace; }
        .input-area input { flex: 1; background-color: #222; color: #0f0; border: none; padding: 5px; font-family: monospace; }
        .input-area button { background-color: #444; color: #fff; border: none; padding: 5px 10px; cursor: pointer; }
        .input-area button:hover { background-color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="bottom-section">
            <div class="terminal" id="terminal"></div>
            <div class="input-area">
                <span class="prompt">Agent1 > </span>
                <input type="text" id="command-input" placeholder="Type command here">
                <button onclick="sendCommand()">Enter</button>
            </div>
        </div>
    </div>
    <script>
        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('command-input');

        function appendToTerminal(text) {
            terminal.textContent += text + '\n';
            terminal.scrollTop = terminal.scrollHeight;
        }

        function sendCommand() {
            const command = commandInput.value;
            if (command.trim()) {
                appendToTerminal(`Agent1 > ${command}`);
                fetch('/input-command-to-execute-from-web', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                commandInput.value = '';
            }
        }

        function fetchResults() {
            fetch('/execution-result-to-show-in-web')
                .then(response => response.json())
                .then(data => {
                    const result = data.execution_result || "";
                    if (result) {
                        appendToTerminal(result);
                    }
                });
        }

        setInterval(fetchResults, 5000);
    </script>
</body>
</html>
